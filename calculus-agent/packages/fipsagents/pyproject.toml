[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fipsagents"
version = "0.6.0.dev0"
description = "Production-ready AI agent framework for FIPS/OpenShift environments"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
authors = [
    {name = "Red Hat AI Americas"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
]
keywords = ["ai", "agent", "llm", "openshift", "fips", "mcp"]
dependencies = [
    "litellm>=1.83.0",
    "fastmcp>=3.0.0",
    "pydantic>=2.0",
    "pyyaml",
    "httpx",
    "python-frontmatter",
]

[project.optional-dependencies]
memory = [
    "memoryhub",
]
pgvector = [
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
]
server = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov",
]

[project.urls]
Homepage = "https://github.com/redhat-ai-americas/agent-template"
Repository = "https://github.com/redhat-ai-americas/agent-template"
Issues = "https://github.com/redhat-ai-americas/agent-template/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "local_tool: Tests using local @tool dispatch",
    "mcp_http: Tests using MCP streamable-http transport",
    "mcp_stdio: Tests using MCP stdio transport",
    "llamastack: Tests using LlamaStack proxy dispatch",
    "kagenti: Tests using Kagenti Gateway dispatch",
]
